name: Daily Project Ideas

on:
  schedule:
    - cron: '30 2 * * *'   # 2:30 AM UTC = 8:00 AM IST
  workflow_dispatch:        # Manual trigger — use to test without waiting for schedule

jobs:
  send-ideas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate and send 15 project ideas
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.MODELS_TOKEN }}
        run: python scripts/generate_ideas.py
